services:

    db:
        image: mariadb:11.8.6
        restart: on-failure
        ports:
            - 3306:3306
        environment:
            MARIADB_ROOT_PASSWORD: root
            MARIADB_DATABASE: "mariastan_test"
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
        command:
            - --innodb-use-native-aio=0

    adminer:
        image: adminer
        restart: on-failure
        ports:
            - 8080:8080
        environment:
            ADMINER_DEFAULT_SERVER: 127.0.0.1
            ADMINER_PLUGINS: >
                tables-filter
